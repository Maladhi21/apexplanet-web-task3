<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 3 - Interactive Responsive Site</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <header class="glass-header">
        <h1>Task 3 Interactive Experience</h1>
    </header>
    
    <main class="container">
        <!-- Responsive Grid for Layout -->
        <div class="dashboard">
            
            <!-- Carousel Section -->
            <section class="card carousel-section">
                <h2>Image Carousel</h2>
                <div class="carousel-container">
                    <div class="carousel-slide fade">
                        <img src="https://images.unsplash.com/photo-1506744626753-1fa44df31c78?q=80&w=600&auto=format&fit=crop" alt="Nature 1">
                        <div class="caption">Beautiful Mountains</div>
                    </div>
                    <div class="carousel-slide fade">
                        <img src="https://images.unsplash.com/photo-1532274402911-5a369e4c4bb5?q=80&w=600&auto=format&fit=crop" alt="Nature 2">
                        <div class="caption">Forest Lake</div>
                    </div>
                    <div class="carousel-slide fade">
                        <img src="https://images.unsplash.com/photo-1472214103451-9374bd1c798e?q=80&w=600&auto=format&fit=crop" alt="Nature 3">
                        <div class="caption">Scenic Valley</div>
                    </div>
                    
                    <a class="prev" onclick="plusSlides(-1)">&#10094;</a>
                    <a class="next" onclick="plusSlides(1)">&#10095;</a>
                </div>
                <div class="dots">
                    <span class="dot" onclick="currentSlide(1)"></span> 
                    <span class="dot" onclick="currentSlide(2)"></span> 
                    <span class="dot" onclick="currentSlide(3)"></span> 
                </div>
            </section>

            <!-- API Fetch Section -->
            <section class="card api-section">
                <h2>Random Joke Generator</h2>
                <p>Fetching real-time data from a public API.</p>
                <div class="joke-container">
                    <div class="joke-content" id="jokeText">Click the button to fetch a joke!</div>
                </div>
                <button id="fetchJokeBtn" class="btn">Get New Joke</button>
            </section>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Advanced Styling & JS Task</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
